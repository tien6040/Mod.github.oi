<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
}

/* HEADER */
header {
    padding: 20px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 20px;
    background: linear-gradient(45deg, #22c55e, #4ade80);
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #16a34a, #22c55e);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* EMBED */
iframe {
    width: 100%;
    height: 500px;
    border-radius: 12px;
    border: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 14px;
    opacity: 0.6;
}
</style>
  </head>
